<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6A6A"/>
      <stop offset="60%" style="stop-color:#3D8B70"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Map pin icon (simplified) -->
  <g transform="translate(256,256)">
    <!-- Pin body -->
    <ellipse cx="0" cy="-55" rx="72" ry="72" fill="white" opacity="0.95"/>
    <!-- Pin hole -->
    <ellipse cx="0" cy="-55" rx="30" ry="30" fill="url(#bg)"/>
    <!-- Pin tail -->
    <path d="M-24,-10 Q0,80 0,105 Q0,80 24,-10 Z" fill="white" opacity="0.95"/>
  </g>
  <!-- O'z text -->
  <text x="256" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="68" font-weight="700" fill="white" opacity="0.90">O'zGezer</text>
</svg>
